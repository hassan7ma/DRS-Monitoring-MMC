name: DRS Monitor CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:

env:
  AWS_REGION: eu-west-1
  ALERT_EMAIL: ${{ vars.ALERT_EMAIL }}

jobs:
  security:
    name: Security Scans
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Install CDK app dependencies
        run: pip install -r cdk/requirements.txt

      # -------- CDK Synth (placeholder context, no AWS creds needed) --------
      - name: CDK Synth
        working-directory: cdk
        run: |
          cdk synth \
            -c alert_email=placeholder@example.com \
            -c lag_threshold=120 \
            -c drs_regions="" \
            -c account=000000000000 \
            -c region=${{ env.AWS_REGION }}

      # -------- Checkov on synthesized CloudFormation template --------
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: cdk/cdk.out
          quiet: true
          soft_fail: false
          framework: cloudformation

      # -------- Bandit (Lambda) --------
      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: |
          bandit -r cdk/lambda -ll -ii

  deploy:
    name: Deploy Stack
    needs: security
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Install CDK app dependencies
        run: pip install -r cdk/requirements.txt

      # -------- AWS Auth (OIDC) --------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::991587605613:role/GitHub-Deploy-Role
          aws-region: ${{ env.AWS_REGION }}

      # -------- Preview changes --------
      - name: CDK Diff
        working-directory: cdk
        run: |
          cdk diff \
            -c alert_email="${{ env.ALERT_EMAIL }}" \
            -c lag_threshold=120 \
            -c drs_regions="" || true

      # -------- Deploy (CDK owns asset packaging - no manual S3 bucket) --------
      - name: CDK Deploy
        working-directory: cdk
        run: |
          cdk deploy --require-approval never \
            -c alert_email="${{ env.ALERT_EMAIL }}" \
            -c lag_threshold=120 \
            -c drs_regions=""
