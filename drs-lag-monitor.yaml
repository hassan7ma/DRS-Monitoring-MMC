AWSTemplateFormatVersion: "2010-09-09"
Description: DRS Replication Lag Monitor using Lambda, EventBridge, and SNS

Parameters:

  AlertEmail:
    Type: String
    Description: Email address to receive SNS alerts

  LagThreshold:
    Type: Number
    Default: 120
    Description: Replication lag threshold (seconds)

  DRSRegions:
    Type: String
    Default: ""
    Description: Comma-separated regions (leave empty = current region)

  LambdaCodeBucket:
    Type: String
    Description: S3 bucket for Lambda code

  LambdaCodeKey:
    Type: String
    Description: S3 key for Lambda zip


Resources:

# ------------------------------------------------------------
# KMS Key (Lambda Env Encryption)
# ------------------------------------------------------------
  LambdaKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for Lambda environment variables
      EnableKeyRotation: true

# ------------------------------------------------------------
# Dead Letter Queue
# ------------------------------------------------------------
  LambdaDLQ:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: !GetAtt LambdaKmsKey.Arn
      KmsDataKeyReusePeriodSeconds: 300

# ------------------------------------------------------------
# SNS Topic
# ------------------------------------------------------------
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: drs-lag-alerts
      KmsMasterKeyId: !GetAtt LambdaKmsKey.Arn

# ------------------------------------------------------------
# SNS Email Subscription
# ------------------------------------------------------------
  AlertSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      TopicArn: !Ref AlertTopic
      Endpoint: !Ref AlertEmail

# ------------------------------------------------------------
# IAM Role
# ------------------------------------------------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: lambda-drs-monitor-role

      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

      Policies:
        - PolicyName: DRSMonitorPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:

              # DRS Read
              - Effect: Allow
                Action:
                  - drs:DescribeSourceServers
                Resource: "*"

              # EC2 Read
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                Resource: "*"

              # SNS Publish
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref AlertTopic

              # SQS Access (DLQ)
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt LambdaDLQ.Arn

              # KMS Access
              - Effect: Allow
                Action:
                  - kms:Encrypt
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt LambdaKmsKey.Arn

# ------------------------------------------------------------
# Lambda Function
# ------------------------------------------------------------
  LambdaFunctionDRSLagChecker:
    Type: AWS::Lambda::Function

    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_117
            comment: "Lambda only accesses public AWS APIs (DRS, EC2, SNS)"

    Properties:

      FunctionName: DRS-LagChecker
      Runtime: python3.12
      Handler: index.lambda_handler
      MemorySize: 128
      Timeout: 120

      ReservedConcurrentExecutions: 2

      Role: !GetAtt LambdaExecutionRole.Arn

      KmsKeyArn: !GetAtt LambdaKmsKey.Arn

      DeadLetterConfig:
        TargetArn: !GetAtt LambdaDLQ.Arn

      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Ref LambdaCodeKey
        
      Environment:
        Variables:
          LAG_THRESHOLD_SECONDS: !Ref LagThreshold
          SNS_TOPIC_ARN: !Ref AlertTopic
          DRS_REGIONS: !Ref DRSRegions

# ------------------------------------------------------------
# EventBridge Schedule
# ------------------------------------------------------------
  DRSMonitorRule:
    Type: AWS::Events::Rule
    Properties:
      Name: DRS-Monitor-8H
      ScheduleExpression: rate(8 hours)
      State: ENABLED
      Targets:
        - Arn: !GetAtt LambdaFunctionDRSLagChecker.Arn
          Id: DRSMonitorTarget

# ------------------------------------------------------------
# Allow EventBridge Invoke
# ------------------------------------------------------------
  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LambdaFunctionDRSLagChecker.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DRSMonitorRule.Arn

Outputs:

  LambdaName:
    Value: !Ref LambdaFunctionDRSLagChecker

  EventRuleName:
    Value: !Ref DRSMonitorRule

  DLQName:
    Value: !Ref LambdaDLQ

  KmsKeyId:
    Value: !Ref LambdaKmsKey

  SNSTopic:
    Value: !Ref AlertTopic

