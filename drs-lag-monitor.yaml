AWSTemplateFormatVersion: "2010-09-09"
Description: DR-Monitoring - DRS Replication Lag Monitor using Lambda, EventBridge, and SNS
 
Parameters:
 
  AlertEmail:
    Type: String
    Description: Email address to receive SNS alerts
 
  LagThreshold:
    Type: Number
    Default: 120
    Description: Replication lag threshold (seconds)
 
  DRSRegions:
    Type: String
    Default: ""
    Description: Comma-separated regions (leave empty = current region)
 
  LambdaCodeBucket:
    Type: String
    Description: S3 bucket for Lambda code
 
  LambdaCodeKey:
    Type: String
    Description: S3 key for Lambda zip
 
 
Resources:
 
# ------------------------------------------------------------
# Dead Letter Queue
# ------------------------------------------------------------
  LambdaDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "DR-Monitoring-dlq-${AWS::AccountId}"
      MessageRetentionPeriod: 1209600
 
# ------------------------------------------------------------
# SNS Topic
# ------------------------------------------------------------
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "DR-Monitoring-sns-topic-${AWS::AccountId}"
 
# ------------------------------------------------------------
# SNS Email Subscription
# ------------------------------------------------------------
  AlertSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      TopicArn: !Ref AlertTopic
      Endpoint: !Ref AlertEmail
 
# ------------------------------------------------------------
# IAM Role
# ------------------------------------------------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "DR-Monitoring-lambda-role-${AWS::AccountId}"
 
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
 
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
 
      Policies:
        - PolicyName: !Sub "DR-Monitoring-lambda-policy-${AWS::AccountId}"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
 
              # DRS Read
              - Effect: Allow
                Action:
                  - drs:DescribeSourceServers
                Resource: "*"
 
              # EC2 Read
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                Resource: "*"
 
              # SNS Publish
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref AlertTopic
 
              # SQS Access (DLQ)
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt LambdaDLQ.Arn
 
# ------------------------------------------------------------
# Lambda Function
# ------------------------------------------------------------
  LambdaFunctionDRSLagChecker:
    Type: AWS::Lambda::Function
 
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_117
            comment: "Lambda only accesses public AWS APIs (DRS, EC2, SNS)"
 
    Properties:
 
      FunctionName: !Sub "DR-Monitoring-lambda-${AWS::AccountId}"
      Runtime: python3.12
      Handler: index.lambda_handler
      MemorySize: 128
      Timeout: 120
 
      ReservedConcurrentExecutions: 2
 
      Role: !GetAtt LambdaExecutionRole.Arn
 
      DeadLetterConfig:
        TargetArn: !GetAtt LambdaDLQ.Arn
 
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Ref LambdaCodeKey
 
      Environment:
        Variables:
          LAG_THRESHOLD_SECONDS: !Ref LagThreshold
          SNS_TOPIC_ARN: !Ref AlertTopic
          DRS_REGIONS: !Ref DRSRegions
 
# ------------------------------------------------------------
# EventBridge Schedule
# ------------------------------------------------------------
  DRSMonitorRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "DR-Monitoring-eventbridge-rule-${AWS::AccountId}"
      ScheduleExpression: rate(8 hours)
      State: ENABLED
      Targets:
        - Arn: !GetAtt LambdaFunctionDRSLagChecker.Arn
          Id: DRSMonitorTarget
 
# ------------------------------------------------------------
# Allow EventBridge Invoke
# ------------------------------------------------------------
  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LambdaFunctionDRSLagChecker.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DRSMonitorRule.Arn
 
Outputs:
 
  LambdaName:
    Value: !Ref LambdaFunctionDRSLagChecker
 
  EventRuleName:
    Value: !Ref DRSMonitorRule
 
  DLQName:
    Value: !Ref LambdaDLQ
 
  SNSTopic:
    Value: !Ref AlertTopic